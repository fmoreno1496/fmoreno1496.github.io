<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan's Story — The Phoenix Experience</title>
<style>
  :root{
    --navy:#082240; --navy2:#0B2C52; --ink:#162033; --teal:#158EA6; --teal-lt:#8FD6E4;
    --gold:#D9A51C; --green:#629B44; --red:#C4553B; --mist:#D8E2EE; --gray:#6B7280; --line:#E2E8F0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Aptos","Segoe UI",system-ui,-apple-system,sans-serif; color:var(--ink); background:#fff; line-height:1.55;}
  .wrap{max-width:680px; margin:0 auto; padding:0 20px;}
  .kicker{font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--teal);}
  .kicker.gold{color:var(--gold);}

  header{position:relative; color:#fff; padding:120px 0 90px; background:var(--navy);}
  header .bg{position:absolute; inset:0; background-size:cover; background-position:center 30%; opacity:.45;}
  header .shade{position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,34,64,.35), rgba(8,34,64,.92));}
  header .wrap{position:relative; z-index:2;}
  header h1{font-size:clamp(36px,8vw,56px); font-weight:800; line-height:1.08; margin:14px 0 12px;}
  header p.sub{color:var(--mist); font-size:17px; max-width:46ch;}
  header p.tag{margin-top:22px; color:var(--teal-lt); font-size:14px; font-weight:600;}

  nav{position:sticky; top:0; z-index:50; background:rgba(8,34,64,.97); backdrop-filter:blur(6px);}
  nav .wrap{display:flex; gap:6px; overflow-x:auto; padding:10px 20px; -webkit-overflow-scrolling:touch;}
  nav a{flex:0 0 auto; color:var(--mist); text-decoration:none; font-size:13px; font-weight:600; padding:7px 12px; border-radius:999px;}
  nav a:hover, nav a.active{background:var(--teal); color:#fff;}

  section{padding:56px 0;}
  section.alt{background:#F6F9FC;}
  section.dark{background:var(--navy); color:#fff;}
  h2{font-size:clamp(24px,5vw,32px); font-weight:800; line-height:1.15; margin:12px 0 10px; color:var(--navy);}﻿
